<ion-content class="signup-content">

  <div class="signup-container">

    <!-- Logo -->
    <div class="logo-section">
      <img src="assets/logo.png" alt="Rennect Logo" class="app-logo">
    </div>

    <!-- Title -->
    <h2 class="title">Create Account</h2>
    <p class="section-subtitle">Join the Rennect community today.</p>

    <!-- Full Name -->
    <div class="input-group">
      <label>FULL NAME</label>
      <ion-item lines="none" class="custom-input-item">
        <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input
          type="text"
          placeholder="Alexander Vance"
          [(ngModel)]="fullName">
        </ion-input>
      </ion-item>
    </div>

    <!-- Email -->
    <div class="input-group">
      <label>EMAIL ADDRESS</label>
      <ion-item lines="none" class="custom-input-item">
        <ion-icon name="mail-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input
          type="email"
          placeholder="alexander@example.com"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label>PASSWORD</label>
      <ion-item lines="none" class="custom-input-item">
        <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="********"
          [(ngModel)]="password">
        </ion-input>
        <ion-button fill="clear" slot="end" class="toggle-password-btn" (click)="togglePassword()">
          <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
        </ion-button>
      </ion-item>
    </div>

    <!-- Signup Button -->
    <ion-button expand="block" class="signup-btn" (click)="signup()">
      Sign Up
    </ion-button>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Social Login -->
    <div class="social-icons">
      <ion-button
  fill="clear"
  class="social-btn"
  (click)="googleSignup()"
>
  <img
    src="assets/google-logo.svg"
    alt="Google"
    class="social-img-icon"
  >
</ion-button>

      <ion-button fill="clear" class="social-btn">
        <ion-icon name="logo-apple"></ion-icon>
      </ion-button>
    </div>

    <!-- Login Link -->
    <p class="login-footer">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>

  </div>

</ion-content>
